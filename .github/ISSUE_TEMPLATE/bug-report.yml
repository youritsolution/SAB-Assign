name: Bug report
description: Report a problem in Intune Bulk Assigner
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in Intune Bulk Assigner.

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 1.0
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 14.6
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - First-run setup
        - Magic Setup
        - Manual configuration
        - Mock mode
        - Live mode / Graph connection
        - Apps section
        - Settings Catalog section
        - Configuration Profiles section
        - Compliance section
        - Apply workflow
        - Unassign workflow
        - Export Evidence
        - Activity Log
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened
      placeholder: Describe the problem
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Error details or Graph response
      placeholder: Paste any app error, Graph message, request ID, or relevant detail

